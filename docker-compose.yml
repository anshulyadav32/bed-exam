services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bed_exam_api
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/bed_exam?schema=public"
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:3000"

  db:
    image: postgres:16-alpine
    container_name: bed_exam_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bed_exam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bed_exam"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: bed_exam_frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
