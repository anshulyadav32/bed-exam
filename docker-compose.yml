services:
  db:
    image: postgres:16-alpine
    container_name: bed_exam_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bed_exam
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d bed_exam" ]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bed_exam_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bed_exam
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  ngrok:
    image: ngrok/ngrok:latest
    container_name: bed_exam_ngrok
    command: http backend:3000
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - backend

volumes:
  postgres_data:
