services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bed_exam_api
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/bed_exam?schema=public"
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      - db
    ports:
      - "4000:3000"

  db:
    image: postgres:15-alpine
    container_name: bed_exam_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bed_exam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: bed_exam_frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
